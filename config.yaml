config_version: 6
log_level: info
token_usage:
  enabled: false
models:
- name: qwen3.6-plus
  display_name: QWEN3.6 Plus
  use: langchain_openai:ChatOpenAI
  model: qwen3.6-plus
  api_key: $OPENAI_API_KEY
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
tool_groups:
- name: web
- name: file:read
- name: file:write
- name: bash
tools:
# - name: web_search
#   group: web
#   use: deerflow.community.ddg_search.tools:web_search_tool
#   max_results: 5
# - name: web_fetch
#   group: web
#   use: deerflow.community.jina_ai.tools:web_fetch_tool
#   timeout: 10
# - name: image_search
#   group: web
#   use: deerflow.community.image_search.tools:image_search_tool
#   max_results: 5
- name: ls
  group: file:read
  use: deerflow.sandbox.tools:ls_tool
- name: read_file
  group: file:read
  use: deerflow.sandbox.tools:read_file_tool
- name: glob
  group: file:read
  use: deerflow.sandbox.tools:glob_tool
  max_results: 200
- name: grep
  group: file:read
  use: deerflow.sandbox.tools:grep_tool
  max_results: 100
- name: write_file
  group: file:write
  use: deerflow.sandbox.tools:write_file_tool
- name: str_replace
  group: file:write
  use: deerflow.sandbox.tools:str_replace_tool
- name: bash
  group: bash
  use: deerflow.sandbox.tools:bash_tool
tool_search:
  enabled: false
uploads:
  pdf_converter: auto
sandbox:
  use: deerflow.sandbox.local:LocalSandboxProvider
  allow_host_bash: false
  bash_output_max_chars: 20000
  read_file_output_max_chars: 50000
  ls_output_max_chars: 20000
skills:
  container_path: /mnt/skills
title:
  enabled: true
  max_words: 6
  max_chars: 60
  model_name: null
summarization:
  enabled: true
  model_name: null
  trigger:
  - type: tokens
    value: 15564
  keep:
    type: messages
    value: 10
  trim_tokens_to_summarize: 15564
  summary_prompt: null
memory:
  enabled: true
  storage_path: memory.json
  debounce_seconds: 30
  model_name: null
  max_facts: 100
  fact_confidence_threshold: 0.7
  injection_enabled: true
  max_injection_tokens: 2000
skill_evolution:
  enabled: false
  moderation_model_name: null
checkpointer:
  type: postgres
  connection_string: postgresql://deerflow:deerflow@localhost:5432/deerflow_admin
admin:
  database_url: postgresql+asyncpg://deerflow:deerflow@localhost:5432/deerflow_admin
  minio:
    endpoint: localhost:9000
    access_key: minioadmin
    secret_key: minioadmin
    bucket: deerflow-skills
    secure: false
  jwt:
    secret_key: deerflow-jwt-secret-change-in-production
    access_token_expire_minutes: 60
    refresh_token_expire_days: 7
  initial_super_admin:
    username: admin
    password: admin123
    email: admin@example.com
